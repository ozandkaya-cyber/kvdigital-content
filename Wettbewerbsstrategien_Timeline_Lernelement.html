<!doctype html><html lang="de-CH"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Wettbewerbsstrategien Timeline</title><style>:root{--bg:#fff4e8;--panel:#fffaf2;--card:#fffdf8;--line:#ead7c2;--ink:#21180f;--muted:#715d49;--dark:#4b2d1a;--orange:#e76f1f;--green:#15803d;--greenbg:#ecfdf3;--warn:#b45309;--red:#e30613;--violet:#97002e;--mammut:#d0003b}*{box-sizing:border-box}body{margin:0;padding:16px;min-height:100vh;font-family:Segoe UI,Arial,sans-serif;font-size:18px;color:var(--ink);background:radial-gradient(circle at 8% 8%,rgba(255,180,98,.35),transparent 28%),radial-gradient(circle at 92% 12%,rgba(220,0,59,.15),transparent 30%),linear-gradient(180deg,#fff7ee,#f4e4d2)}button,select{font:inherit}.app{max-width:1180px;margin:auto;background:var(--panel);border:1px solid var(--line);border-radius:26px;box-shadow:0 20px 48px rgba(89,55,20,.16);padding:16px;display:grid;gap:12px}.badge{width:max-content;padding:4px 10px;border:1px solid #f1bc84;border-radius:999px;background:#fff0df;color:#76400f;font-weight:800;font-size:.88rem}h1{margin:0;color:#101722;font-size:clamp(1.5rem,3vw,2.1rem);line-height:1.05}.lead{margin:0;color:var(--muted);font-weight:650;line-height:1.45}.top{border:1px solid var(--line);border-radius:14px;background:#fff3e7;padding:9px;display:grid;gap:10px}.tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.tab{border:1px solid #d2d9e3;border-radius:12px;background:#fffaf4;color:#5b432f;padding:10px;font-weight:800;cursor:pointer}.tab.on{background:var(--dark);border-color:var(--dark);color:#fff;box-shadow:0 0 0 3px rgba(231,111,31,.24)}.tab.done{background:#f3eadf}.meta{margin:0;display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;color:#4b596d;font-weight:700}.stage{border:1px solid var(--line);border-radius:22px;background:var(--card);min-height:650px;padding:16px;display:grid;gap:14px}.head{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}.title{margin:0;color:#152233;font-size:clamp(1.35rem,2.4vw,1.8rem)}.pill{border:1px solid #d8dee7;border-radius:999px;background:#f2f5f9;color:#43566f;padding:4px 10px;font-weight:800}.learn{margin:0;border:1px solid #d9e0ea;border-radius:12px;background:#fff6ec;padding:13px 16px;color:#5a3d24;font-weight:750}.task{border:1px solid #ead7c2;border-radius:20px;background:#fffdf8;padding:18px;display:grid;gap:16px}.hint{margin:0;color:var(--muted);font-weight:650;line-height:1.45}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.station,.box,.case{border:2px solid #ecd7bf;border-radius:22px;background:linear-gradient(180deg,#fffdf8,#fff3e4);padding:18px;display:grid;gap:12px;text-align:left;box-shadow:0 10px 26px rgba(89,55,20,.08)}.station{min-height:300px;cursor:pointer}.station:hover{transform:translateY(-3px)}.station.active{border-color:var(--orange);background:linear-gradient(180deg,#fff7ec,#ffe4c6);box-shadow:0 20px 40px rgba(231,111,31,.2),0 0 0 5px rgba(231,111,31,.12)}.logo{min-height:112px;border:1px solid #ecd7bf;border-radius:18px;background:#fff;display:grid;place-items:center;overflow:hidden;padding:12px}.denner{width:100%;height:70px;background:var(--red);display:grid;place-items:center;color:white;font-size:clamp(2rem,6vw,3.3rem);font-weight:950;font-style:italic;letter-spacing:.03em;transform:skew(-10deg)}.victorinox{display:grid;place-items:center;gap:8px}.shield{width:72px;height:84px;background:var(--violet);clip-path:polygon(50% 0,82% 12%,92% 28%,85% 70%,50% 100%,15% 70%,8% 28%,18% 12%);position:relative}.shield:before,.shield:after{content:"";position:absolute;background:white;left:22%;right:22%;top:41%;height:18%}.shield:after{top:20%;bottom:20%;left:41%;right:41%;height:auto}.vword{font-weight:950;font-size:1.35rem;letter-spacing:.06em}.mammut{display:grid;place-items:center;color:var(--mammut);line-height:1}.mammut b{font-size:1.55rem}.mammut span{font-size:.72rem;font-weight:900;letter-spacing:.35em;padding-left:.35em}.mount{font-size:3.2rem;font-weight:900}.copy,.case p{margin:0;color:#4a5c72;font-weight:650;line-height:1.42}h3{margin:0;color:#1e2b3b;font-size:1.2rem}.detail{border:1px solid #f0d2ad;border-radius:14px;background:linear-gradient(180deg,#fff9f1,#fff1df);padding:16px;display:grid;gap:7px}.detail p{margin:0;color:#60421c;font-weight:650}.flip{min-height:530px;perspective:1100px}.inner{position:relative;min-height:530px;transform-style:preserve-3d;transition:.34s}.flip.on .inner{transform:rotateY(180deg)}.face{position:absolute;inset:0;backface-visibility:hidden;border:1px solid #ead7c2;border-radius:20px;padding:18px;display:grid;gap:12px;align-content:start;background:linear-gradient(180deg,#fffdf8,#fff3e4);overflow:hidden}.back{transform:rotateY(180deg);background:linear-gradient(180deg,#fdf7ed,#f7efe4);overflow:auto}.btn{border:1px solid #e7c7a8;border-radius:12px;background:#fff7ee;color:#593820;padding:12px 16px;font-weight:800;cursor:pointer}.next{border:0;background:var(--dark);color:white}.primary{border:0;background:var(--orange);color:white}.list{margin:0;padding-left:18px;color:#4a5c72;font-weight:650;line-height:1.35}.sort{display:grid;grid-template-columns:330px 1fr;gap:16px}.pool,.zone{border:2px dashed #e4c6aa;border-radius:20px;background:#fff7ee;padding:14px;display:grid;gap:10px;align-content:start;min-height:410px}.zones{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.chip,.placed{border:2px solid #e6cdb3;border-radius:15px;background:white;color:#3a2a1d;padding:13px 14px;text-align:left;font-weight:850;cursor:grab;box-shadow:0 8px 18px rgba(89,55,20,.08)}.chip.sel{border-color:var(--orange);background:#fff0df}.zone.over,.zone.target{border-color:var(--orange);background:#fff0df}.zone.success{border-color:#7ccf9a;background:#f0fff5}.placed.ok{border-color:#a8ddbf;background:var(--greenbg);color:var(--green);cursor:pointer}.ghost{position:fixed;z-index:99;pointer-events:none;opacity:.96;box-shadow:0 18px 38px rgba(89,55,20,.22)}.progress{width:max-content;margin:0;border:1px solid #a8ddbf;border-radius:999px;background:#f0fff5;color:var(--green);padding:8px 13px;font-weight:900}.quiz{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.q{border:1px solid #ead7c2;border-radius:18px;background:linear-gradient(180deg,#fffdf8,#fff3e4);padding:16px;display:grid;gap:10px}.q.ok{border-color:#a8ddbf;background:var(--greenbg)}.q.bad{border-color:#f0c89b;background:#fff7ed}select{width:100%;border:1px solid #d5dce6;border-radius:9px;background:white;padding:11px}.opts{display:grid;gap:8px}.opt{border:1px solid #d5dce6;border-radius:10px;background:white;padding:9px;text-align:left;font-weight:780;cursor:pointer}.opt.ok{border-color:#5cb981;background:var(--greenbg);color:var(--green)}.opt.bad{border-color:#f0c89b;background:#fff7ed;color:var(--warn)}.actions{display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap}.fb{margin:0;border:1px solid #d9dfe8;border-radius:10px;background:#f4f7fb;padding:9px 10px;color:#2f3d51;font-weight:650}.fb.ok{border-color:#b7e0c7;background:var(--greenbg);color:var(--green)}.fb.bad{border-color:#f0c89b;background:#fff7ed;color:var(--warn)}@media(max-width:950px){.tabs{grid-template-columns:repeat(2,1fr)}.grid3,.zones,.quiz{grid-template-columns:1fr}.sort{grid-template-columns:1fr}.pool,.zone{min-height:auto}.flip,.inner{min-height:560px}}@media(max-width:640px){body{padding:8px;font-size:16px}.app{border-radius:14px;padding:10px}.tabs{grid-template-columns:1fr}.stage{min-height:0}.denner{font-size:2rem}}</style></head><body><main class="app"><span class="badge">INTERAKTIVES ELEMENT: Wettbewerbsstrategien</span><h1>Porters generische Strategien als Timeline entdecken</h1><p class="lead">Drei Wege zum Wettbewerbsvorteil: günstigster Anbieter sein, einzigartigen Nutzen schaffen oder eine Zielgruppe messerscharf bedienen.</p><section class="top"><div class="tabs" id="tabs"></div><p class="meta"><span><strong id="prog">0/5</strong> Bereiche vollständig gelöst</span><span>Aktiv: <strong id="act">Start</strong></span></p></section><article class="stage" id="stage"></article></main><script>const steps=[['Start','Die drei Wege auf einen Blick','Grundlogik der drei generischen Wettbewerbsstrategien erkennen.'],['Steckbriefe','Strategien als Markenstationen','Kernidee, Voraussetzungen und typische Risiken erklären.'],['Sortieren','Was muss ein Unternehmen dafür können?','Voraussetzungen korrekt zuordnen.'],['Beispiele','Schweizer Beispiele zuordnen','Beispiele einordnen und begründen.'],['Entscheiden','Strategie-Detektiv','Eine passende Strategie ableiten.']];const str=[{id:'cost',nr:'01',t:'Kostenführerschaft',c:'Denner',claim:'Günstigster Anbieter im breiten Markt.',core:'Der Vorteil entsteht durch tiefe Kosten, schlanke Abläufe und einen Preis, den viele Wettbewerber nicht dauerhaft mitgehen können.',ex:'Denner setzt im Schweizer Detailhandel auf tiefe Preise, einfache Strukturen und ein begrenztes Sortiment.',req:['Skaleneffekte','effiziente Prozesse','straffe Kostenkontrolle','schlankes Sortiment'],risk:'Preis allein reicht nicht: Qualität, Verfügbarkeit und Vertrauen dürfen nicht zu stark leiden.'},{id:'diff',nr:'02',t:'Differenzierung',c:'Victorinox',claim:'Einzigartig wirken und dafür mehr verlangen.',core:'Der Vorteil entsteht durch einen Nutzen, den Kundinnen und Kunden klar wahrnehmen: Qualität, Marke, Design, Herkunft oder Service.',ex:'Victorinox steht für das Schweizer Taschenmesser als Ikone: Qualität, Design, Herkunft und Wiedererkennung rechtfertigen einen höheren Preis.',req:['Innovation','Qualität','starke Marke','Kundennähe','Design'],risk:'Einzigartigkeit muss sichtbar und relevant bleiben, sonst bezahlt der Markt den Aufpreis nicht.'},{id:'focus',nr:'03',t:'Nischenstrategie',c:'Mammut',claim:'Ein enges Segment besser bedienen als alle anderen.',core:'Der Vorteil entsteht durch Fokus: Das Unternehmen kennt eine Zielgruppe sehr genau und spezialisiert Angebot, Kommunikation und Leistung darauf.',ex:'Mammut fokussiert stark auf Bergsport und Premium-Outdoor statt auf einen beliebigen Massenmarkt.',req:['tiefe Marktkenntnis','enge Kundenbeziehung','Spezialisierung','klare Zielgruppe'],risk:'Die Nische muss gross genug sein und darf nicht leicht von breiten Wettbewerbern kopiert werden.'}];const chips=[['c1','Skaleneffekte nutzen','cost'],['c2','Prozesse konsequent vereinfachen','cost'],['c3','Sortiment schlank halten','cost'],['d1','Design und Qualität sichtbar machen','diff'],['d2','Marke und Herkunft aufladen','diff'],['d3','Kundenerlebnis pflegen','diff'],['f1','Segment sehr genau kennen','focus'],['f2','enge Beziehungen zur Zielgruppe','focus'],['f3','Spezialwissen aufbauen','focus']];const quiz=[['Ein Detailhändler reduziert Komplexität, kauft gross ein und bleibt beim Preis aggressiv.','cost','Tiefe Preise plus schlanke Prozesse.'],['Ein Messerhersteller verkauft Qualität, Herkunft und Ikonenstatus.','diff','Wahrgenommene Einzigartigkeit.'],['Eine Outdoor-Marke richtet alles auf Bergsport-Premium aus.','focus','Ein klar definiertes Segment.'],['Ein Anbieter will gleichzeitig billigster Massenanbieter, Premium-Ikone und Spezialist sein.','unclear','Das ist eine unklare Mischstrategie.'],['Kunden akzeptieren höhere Kosten, weil sie den Mehrwert sehen.','diff','Der Aufpreis wird gerechtfertigt.'],['Ein Betrieb bedient nur eine kleine Zielgruppe mit spezifischen Bedürfnissen.','focus','Spezifische Bedürfnisse passen zur Nische.']];const cases=[['A: Preisbewusste Kundschaft','Ein Händler hat zentrale Beschaffung, einfache Filialprozesse und eine Kundschaft, die stark auf Preisaktionen reagiert.','cost','Kostenführerschaft passt.'],['B: Aufpreis durch Vertrauen','Ein Traditionsbetrieb kann Herkunft, Qualität und Design glaubwürdig inszenieren.','diff','Differenzierung passt.'],['C: Kleine, klare Community','Ein KMU kennt eine anspruchsvolle Bergsport-Community extrem gut.','focus','Nischenstrategie passt.']];const S={step:1,done:{},intro:{},active:'cost',flip:{},seen:{},sort:{},sel:null,q:{},checked:false,cases:{},fb:'Interaktion starten.',tone:''};const $=x=>document.querySelector(x);const LOGOS={cost:'',diff:'',focus:''};function logo(id){const src=id==='cost'?LOGOS.cost:id==='diff'?LOGOS.diff:LOGOS.focus;if(src)return '<img style="display:block;max-width:100%;max-height:96px;object-fit:contain" src="'+src+'" alt="'+(id==='cost'?'Denner Logo':id==='diff'?'Victorinox Logo':'Mammut Logo')+'">';if(id==='cost')return'<div class="denner">DENNER</div>';if(id==='diff')return'<div class="victorinox"><div class="shield"></div><div class="vword">VICTORINOX</div></div>';return'<div class="mammut"><div class="mount">▲</div><b>MAMMUT</b><span>SWISS 1862</span></div>'}function tabs(){$('#tabs').innerHTML=steps.map((x,i)=>`<button class="tab ${S.step===i+1?'on':''} ${S.done[i+1]?'done':''}" data-s="${i+1}">${S.done[i+1]?'✓':i+1} ${x[0]}</button>`).join('');document.querySelectorAll('[data-s]').forEach(b=>b.onclick=()=>{S.step=+b.dataset.s;render()});$('#prog').textContent=Object.keys(S.done).length+'/5';$('#act').textContent=steps[S.step-1][0]}function shell(inner){let x=steps[S.step-1];$('#stage').innerHTML=`<header class="head"><h2 class="title">${x[1]}</h2><span class="pill">${S.done[S.step]?'Abgeschlossen':'In Bearbeitung'}</span></header><p class="learn">Lernziel: ${x[2]}</p>${inner}<div class="actions"><span><button class="btn" id="prev">Zurück</button> <button class="btn next" id="next">Nächster Bereich</button></span><p class="fb ${S.tone}">${S.fb}</p></div>`;$('#prev').disabled=S.step===1;$('#next').disabled=S.step===5;$('#prev').onclick=()=>{S.step--;render()};$('#next').onclick=()=>{S.step++;render()}}function score(){return chips.filter(c=>S.sort[c[0]]===c[2]).length}function step1(){shell(`<section class="task"><p class="hint">Klicke alle drei Markenstationen an.</p><div class="grid3">${str.map(s=>`<button class="station ${S.active===s.id?'active':''}" data-st="${s.id}"><span class="pill">${s.nr}</span><div class="logo">${logo(s.id)}</div><h3>${s.t}</h3><p class="copy">${s.claim}</p></button>`).join('')}</div><div class="detail" id="detail"></div></section>`);document.querySelectorAll('[data-st]').forEach(b=>b.onclick=()=>{S.active=b.dataset.st;S.intro[S.active]=1;if(Object.keys(S.intro).length===3){S.done[1]=1;S.fb='Sehr gut. Du hast alle drei Stationen erkundet.';S.tone='ok'}render()});let s=str.find(x=>x.id===S.active);$('#detail').innerHTML=`<h3>${s.t} mit ${s.c}</h3><p><b>Kernidee:</b> ${s.claim}</p><p><b>Merksatz:</b> ${s.core}</p>`}function step2(){shell(`<section class="task"><p class="hint">Drehe jede Karte. Die Rückseiten sind scrollbar, damit kein Text aus dem Rahmen läuft.</p><div class="grid3">${str.map(s=>`<article class="flip ${S.flip[s.id]?'on':''}"><div class="inner"><section class="face"><div class="logo">${logo(s.id)}</div><h3>${s.t}</h3><p class="copy">${s.core}</p><button class="btn" data-f="${s.id}">Karte drehen</button></section><section class="face back"><h3>${s.c} als Beispiel</h3><p class="copy">${s.ex}</p><h3>Voraussetzungen</h3><ul class="list">${s.req.map(r=>`<li>${r}</li>`).join('')}</ul><h3>Achtung</h3><p class="copy">${s.risk}</p><button class="btn" data-f="${s.id}">Zurück drehen</button></section></div></article>`).join('')}</div></section>`);document.querySelectorAll('[data-f]').forEach(b=>b.onclick=()=>{S.flip[b.dataset.f]=!S.flip[b.dataset.f];S.seen[b.dataset.f]=1;if(Object.keys(S.seen).length===3){S.done[2]=1;S.fb='Alle Steckbriefe gelesen.';S.tone='ok'}render()})}function place(id,z){let c=chips.find(x=>x[0]===id);if(!c||S.sort[id])return;if(c[2]===z){S.sort[id]=z;S.sel=null;S.fb='Richtig. Die Karte bleibt grün.';S.tone='ok';if(score()===chips.length){S.done[3]=1;S.fb='Alles richtig abgelegt. Sehr schön gespielt.'}}else{S.sel=id;S.fb='Noch nicht passend. Probiere ein anderes Feld.';S.tone='bad'}render()}let drag=null;function step3(){let rem=chips.filter(c=>!S.sort[c[0]]);shell(`<section class="task"><p class="hint">Ziehe Karten ins passende Feld. Richtig abgelegt wird sofort grün.</p><p class="progress">${score()}/${chips.length} richtig abgelegt</p><div class="sort"><div class="pool"><h3>Zieh-Karten</h3>${rem.length?rem.map(c=>`<button class="chip ${S.sel===c[0]?'sel':''}" draggable="true" data-chip="${c[0]}">${c[1]}</button>`).join(''):'<p class="copy">Alle Karten sind platziert.</p>'}</div><div class="zones">${str.map(s=>`<section class="zone ${S.sel?'target':''} ${chips.some(c=>S.sort[c[0]]===s.id)?'success':''}" data-zone="${s.id}"><h3>${s.t}</h3><p class="copy">${s.claim}</p>${chips.filter(c=>S.sort[c[0]]===s.id).map(c=>`<button class="placed ok" data-rem="${c[0]}">✓ ${c[1]}</button>`).join('')}</section>`).join('')}</div></div><button class="btn primary" id="clear">Sortierung leeren</button></section>`);document.querySelectorAll('[data-chip]').forEach(b=>{b.ondragstart=e=>e.dataTransfer.setData('text/plain',b.dataset.chip);b.onclick=()=>{S.sel=S.sel===b.dataset.chip?null:b.dataset.chip;render()}});document.querySelectorAll('[data-zone]').forEach(z=>{z.ondragover=e=>{e.preventDefault();z.classList.add('over')};z.ondragleave=()=>z.classList.remove('over');z.ondrop=e=>{e.preventDefault();z.classList.remove('over');place(e.dataTransfer.getData('text/plain'),z.dataset.zone)};z.onclick=()=>{if(S.sel)place(S.sel,z.dataset.zone)}});document.querySelectorAll('[data-rem]').forEach(b=>b.onclick=e=>{e.stopPropagation();delete S.sort[b.dataset.rem];delete S.done[3];render()});$('#clear').onclick=()=>{S.sort={};S.sel=null;delete S.done[3];S.fb='Sortierung geleert.';S.tone='';render()}}function step4(){shell(`<section class="task"><p class="hint">Ordne jede Aussage einer Strategie zu.</p><div class="quiz">${quiz.map((q,i)=>{let v=S.q[i]||'',ok=S.checked&&v===q[1],bad=S.checked&&v&&v!==q[1];return`<article class="q ${ok?'ok':''} ${bad?'bad':''}"><label>${q[0]}</label><select data-q="${i}"><option value="">Auswählen ...</option><option value="cost" ${v==='cost'?'selected':''}>Kostenführerschaft</option><option value="diff" ${v==='diff'?'selected':''}>Differenzierung</option><option value="focus" ${v==='focus'?'selected':''}>Nischenstrategie</option><option value="unclear" ${v==='unclear'?'selected':''}>unklare Mischstrategie</option></select><p class="copy">${bad?q[2]:ok?'Richtig.':''}</p></article>`}).join('')}</div><button class="btn primary" id="check">Mini-Check</button></section>`);document.querySelectorAll('[data-q]').forEach(s=>s.onchange=()=>{S.q[s.dataset.q]=s.value;S.checked=false});$('#check').onclick=()=>{S.checked=true;let n=quiz.filter((q,i)=>S.q[i]===q[1]).length;if(n===quiz.length){S.done[4]=1;S.fb='Sehr gut. Alles richtig zugeordnet.';S.tone='ok'}else{S.fb=n+'/'+quiz.length+' korrekt. Nutze die Hinweise.';S.tone='bad'}render()}}function step5(){shell(`<section class="task"><p class="hint">Wähle pro Fall die passendste Strategie.</p><div class="grid3">${cases.map((c,i)=>{let ch=S.cases[i];return`<article class="case"><h3>${c[0]}</h3><p>${c[1]}</p><div class="opts">${str.map(s=>`<button class="opt ${ch===s.id?(ch===c[2]?'ok':'bad'):''}" data-case="${i}:${s.id}">${s.t}</button>`).join('')}</div><p>${ch?c[3]:'Noch keine Entscheidung getroffen.'}</p></article>`}).join('')}</div><div class="detail"><h3>Merksatz</h3><p>Kostenführerschaft fragt: Wie werden wir effizienter? Differenzierung fragt: Wofür zahlen Kunden mehr? Fokus fragt: Welche Zielgruppe bedienen wir besser als alle anderen?</p></div></section>`);document.querySelectorAll('[data-case]').forEach(b=>b.onclick=()=>{let [i,id]=b.dataset.case.split(':');S.cases[i]=id;let n=cases.filter((c,j)=>S.cases[j]===c[2]).length;if(n===cases.length){S.done[5]=1;S.fb='Alle Fälle richtig entschieden.';S.tone='ok'}else{S.fb=n+'/'+cases.length+' Fälle korrekt.';S.tone=''}render()})}function render(){tabs();if(S.step===1)step1();else if(S.step===2)step2();else if(S.step===3)step3();else if(S.step===4)step4();else step5();tabs()}async function loadLogoPayload(name,mime,count){const parts=await Promise.all(Array.from({length:count},(_,i)=>fetch(`Wettbewerbsstrategien_logo_payload/${name}_${i}.txt`,{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error(name+' '+i);return r.text()})));return `data:${mime};base64,${parts.join('')}`;}Promise.all([loadLogoPayload('denner','image/jpeg',5),loadLogoPayload('victorinox','image/svg+xml',1),loadLogoPayload('mammut','image/png',2)]).then(([denner,victorinox,mammut])=>{LOGOS.cost=denner;LOGOS.diff=victorinox;LOGOS.focus=mammut;render()}).catch(err=>{console.error(err);render()});</script></body></html>
