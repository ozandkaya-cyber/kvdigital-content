<!doctype html><meta charset=utf-8><script>Promise.all([0,1,2,3,4,5,6,7].map(i=>fetch('swot-analyse-canvas-payload/'+i+'.txt',{cache:'no-store'}).then(r=>r.text()))).then(p=>{document.open();document.write(new TextDecoder().decode(Uint8Array.from(atob(p.join('')),c=>c.charCodeAt(0))));document.close()}).catch(e=>{document.body.textContent='Die SWOT-Interaktion konnte nicht geladen werden.';console.error(e)});</script>
